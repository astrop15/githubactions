name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: devops-app/package-lock.json

      - name: Install dependencies
        run: cd devops-app && npm ci

      - name: Run tests
        run: |
          cd devops-app
          set -o pipefail
          npm test 2>&1 | tee test-output.txt

      - name: Upload test artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-output-node-${{ matrix.node-version }}
          path: devops-app/test-output.txt

  build:
    needs: test
    uses: ./.github/workflows/reusable-docker.yml
    with:
      image-name: devops-app
      context: ./devops-app

  security:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup shared DevOps tools
        uses: ./.github/actions/setup-tools
        with:
          install-terraform: 'false'

      - name: Scan application files
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: 'devops-app/'
          severity: 'HIGH,CRITICAL'
          exit-code: '1'
          format: 'table'

  deploy-staging:
    needs: [build, security]
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Use secrets safely
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          API_KEY: ${{ secrets.API_KEY }}
        run: |
          echo "Secrets are masked in logs"
          echo "DB_PASSWORD length: ${#DB_PASSWORD}"
          echo "API_KEY length: ${#API_KEY}"
      - run: echo "Deploying to staging..."

  deploy-production:
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment: production
    steps:
      - run: echo "Deploying to production..."
